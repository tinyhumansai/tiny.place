name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint SDK
        run: pnpm --filter @tinyhumansai/tinyplace lint

      - name: Build SDK for website imports
        run: pnpm --filter @tinyhumansai/tinyplace build

      - name: Lint Website
        run: pnpm --filter @tinyplace/website lint

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm --filter @tinyplace/website format --check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck SDK
        run: pnpm --filter @tinyhumansai/tinyplace build

      - name: Typecheck Website
        run: tsc --noEmit
        working-directory: website

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build SDK for website imports
        run: pnpm --filter @tinyhumansai/tinyplace build

      - name: Unit tests
        run: pnpm --filter @tinyplace/website exec vitest run src/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Upload website build
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: website/.next
          retention-days: 7

  rust-sdk:
    name: Rust SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # This job executes repo code (cargo build/test); don't persist the
          # token in git config.
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk/rust

      - name: Check formatting
        run: cargo fmt --check
        working-directory: sdk/rust

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: sdk/rust

      - name: Build
        run: cargo build --all-targets
        working-directory: sdk/rust

      - name: Test
        run: cargo test
        working-directory: sdk/rust
